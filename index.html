<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Number Match - Premium Playable Ad</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  
  <style>
    /* --- CSS RESET & VARIABLES --- */
    :root {
      /* Theme: Soft Orange-Cream aesthetic matching reference outro image */
      --bg-color: #fcecd7;
      --app-bg: #fcecd7;
      --app-border: #000000;
      
      --primary-color: #ffaa00; /* soft orange border accent */
      --primary-glow: rgba(255, 170, 0, 0.4);
      --accent-color: #10b981; /* green for success */
      --accent-glow: rgba(16, 185, 129, 0.3);
      --danger-color: #ef4444; /* red for mismatch */
      --danger-glow: rgba(239, 68, 68, 0.3);
      
      --text-color: #000000;
      --grid-border-color: #000000; /* bold black borders */
      --font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #f0f0f2;
      font-family: var(--font-family);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* --- GAME CONTAINER (Portrait ratio locked) --- */
    #app-container {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 480px;
      max-height: 854px;
      aspect-ratio: 9 / 16;
      background-color: var(--app-bg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      border-radius: 0px;
      border: none;
      transition: all 0.3s ease;
    }

    @media (min-width: 481px) and (min-height: 855px) {
      #app-container {
        border-radius: 20px;
        border: 2px solid var(--app-border);
      }
    }

    /* --- CANVAS LAYER FOR PARTICLES --- */
    #particles-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }

    /* --- HEADER (Clean Outro style layout) --- */
    .header-panel {
      position: relative;
      z-index: 10;
      padding: 16px 20px 14px 20px;
      background-color: var(--app-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      transition: background-color 0.3s ease;
    }

    .mission-title {
      font-size: 16px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      text-align: center;
      line-height: 1.3;
      color: #000000;
    }

    .target-title {
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      opacity: 0.7;
      margin-top: -6px;
      color: #000000;
    }

    .score-capsule {
      background: #ffffff;
      border: 2px solid #000000;
      padding: 6px 24px;
      border-radius: 50px;
      font-weight: 800;
      font-size: 18px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 3px 0 #000000;
      color: #000000;
    }

    .score-capsule.pulse {
      transform: scale(1.1);
      background-color: #fffbeb;
      box-shadow: 0 5px 0 #000000;
    }

    /* --- AI PERFORMANCE ANALYZER --- */
    .ai-analyzer {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #ffffff;
      padding: 6px 12px;
      border-radius: 10px;
      border: 1.5px solid #000000;
      margin-top: 4px;
      box-shadow: 0 3px 0 #000000;
      transition: all 0.3s ease;
    }

    .ai-badge {
      font-size: 11px;
      font-weight: 800;
      padding: 4px 8px;
      border-radius: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all 0.3s ease;
    }

    .ai-badge.tier-learner {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid var(--accent-color);
      color: #047857;
    }

    .ai-badge.tier-solver {
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid #3b82f6;
      color: #1d4ed8;
    }

    .ai-badge.tier-master {
      background: rgba(168, 85, 247, 0.1);
      border: 1px solid #a855f7;
      color: #7e22ce;
    }

    .ai-energy-wrapper {
      flex: 1;
      height: 8px;
      background: #e2e8f0;
      border-radius: 4px;
      overflow: hidden;
    }

    .ai-energy-bar {
      height: 100%;
      width: 50%;
      background: linear-gradient(90deg, var(--accent-color), #ffaa00);
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .ai-emoji {
      font-size: 16px;
      transition: transform 0.2s ease;
    }

    /* --- BLACK SEPARATOR LINE --- */
    .separator-line {
      width: 100%;
      height: 2px;
      background-color: #000000;
      z-index: 10;
      transition: background-color 0.3s ease;
    }

    /* --- GAMEPLAY AREA --- */
    .gameplay-area {
      flex: 1;
      position: relative;
      background-color: var(--app-bg);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
      z-index: 8;
      transition: all 0.3s ease;
      overflow: hidden;
    }

    /* Red Warning Flash Overlay for mistakes */
    .gameplay-area.red-flash {
      animation: flashRed 0.35s ease;
    }

    @keyframes flashRed {
      0%, 100% { background-color: var(--app-bg); }
      50% { background-color: rgba(239, 68, 68, 0.15); }
    }

    .board-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      grid-template-rows: repeat(13, 1fr);
      background-color: transparent;
      border: 2px solid var(--grid-border-color);
      padding: 0;
      overflow: hidden;
      transition: border-color 0.3s ease;
    }

    /* --- SVG VECTOR LINES OVERLAY (Issue 1 Resolved: Sibling Absolute Over Grid) --- */
    #connector-svg {
      position: absolute;
      top: 12px; 
      left: 12px;
      width: calc(100% - 24px); 
      height: calc(100% - 24px); 
      pointer-events: none;
      z-index: 20;
      overflow: visible;
    }

    .connector-line {
      fill: none;
      stroke: #ffaa00; /* Soft orange vector line */
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 0.3s ease;
    }

    /* --- GRID CELL BUTTON --- */
    .grid-cell {
      position: relative;
      background-color: #ffffff;
      border: 1.5px solid var(--grid-border-color);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 18px;
      font-weight: 800;
      color: #000000;
      cursor: pointer;
      box-shadow: none;
      aspect-ratio: 1;
      outline: none;
      margin: -0.5px; /* collapsing grid borders cleanly */
      transition: transform 0.1s ease, background-color 0.1s ease, color 0.1s ease, box-shadow 0.15s ease, border-color 0.3s ease;
    }

    .grid-cell.selected {
      background-color: #fbe7ce; /* Soft Orange Match Highlight matching 3x3 icon */
      color: #ff6600;
      border-color: #ffaa00;
      box-shadow: 0 0 10px var(--primary-glow);
      z-index: 10;
      transform: scale(1.05);
    }

    .grid-cell.empty {
      background-color: transparent !important;
      border-color: transparent !important;
      color: transparent !important;
      pointer-events: none;
      z-index: 1;
    }

    /* --- FLOATING TEXT / XP FX --- */
    .floating-text {
      position: absolute;
      font-weight: 800;
      font-size: 16px;
      color: #000000;
      pointer-events: none;
      z-index: 15;
      text-shadow: 0 1px 2px rgba(255,255,255,0.8);
      animation: floatUp 1s cubic-bezier(0.25, 1, 0.50, 1) forwards;
    }

    .floating-xp {
      color: #10b981;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(0.8);
        opacity: 0;
      }
      20% {
        transform: translateY(-20px) scale(1.2);
        opacity: 1;
      }
      100% {
        transform: translateY(-70px) scale(1);
        opacity: 0;
      }
    }

    /* --- EMOTION OVERLAY ENGINE --- */
    .emotion-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 25;
      overflow: hidden;
    }

    .emotion-emoji {
      position: absolute;
      font-size: 40px;
      pointer-events: none;
      transform: translate(-50%, -50%);
      animation: floatEmoji 1.3s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
    }

    @keyframes floatEmoji {
      0% {
        transform: translate(-50%, -50%) scale(0.3) rotate(0deg);
        opacity: 0;
      }
      30% {
        transform: translate(-50%, -60px) scale(1.4) rotate(15deg);
        opacity: 1;
      }
      100% {
        transform: translate(-50%, -140px) scale(0.9) rotate(-10deg);
        opacity: 0;
      }
    }

    /* --- COMBO SYSTEM --- */
    .combo-badge-overlay {
      position: absolute;
      top: 35%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.5);
      font-size: 44px;
      font-weight: 800;
      font-style: italic;
      color: #ffaa00;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
      pointer-events: none;
      z-index: 18;
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .combo-badge-overlay.active {
      transform: translate(-50%, -50%) scale(1.3);
      opacity: 1;
    }

    /* Screen shake for mistakes / high combos */
    .shake {
      animation: screenShake 0.35s ease;
    }

    @keyframes screenShake {
      0%, 100% { transform: translate(0, 0); }
      10%, 90% { transform: translate(-4px, 2px); }
      30%, 70% { transform: translate(4px, -2px); }
      50% { transform: translate(-2px, -2px); }
    }

    /* --- FOOTER CONTROLS --- */
    .footer-panel {
      position: relative;
      z-index: 10;
      padding: 12px 20px;
      background-color: var(--app-bg);
      border-top: 2px solid var(--grid-border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background-color 0.3s ease, border-color 0.3s ease;
    }

    .footer-info {
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      opacity: 0.6;
      color: #000000;
    }

    .control-btn {
      background: transparent;
      border: none;
      color: #000000;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      outline: none;
    }

    .control-btn:active {
      transform: scale(0.9);
    }

    /* --- OUTRO / CTA OVERLAY (Beige / Soft Cream Theme) --- */
    #cta-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #fcecd7; /* Soft Orange Cream */
      z-index: 100;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    #cta-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .outro-card {
      width: 100%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      transform: translateY(30px);
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1) 0.1s;
    }

    #cta-overlay.active .outro-card {
      transform: translateY(0);
    }

    .outro-title {
      font-size: 28px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #000000;
      text-align: center;
      margin-bottom: -4px;
    }

    /* Centered 3x3 Grid Icon representation */
    .icon-grid-display {
      background: #ffffff;
      border: 1px solid var(--grid-border-color);
      border-radius: 16px;
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
      width: 130px;
      height: 130px;
      margin-bottom: 8px;
    }

    .icon-cell {
      background: #ffffff;
      border: 1px solid var(--grid-border-color);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 16px;
      font-weight: 800;
      border-radius: 4px;
    }

    .icon-cell.match-highlight {
      background-color: #fbe7ce; /* Soft Orange Match Highlight */
      border-color: #ffaa00;
      color: #ff6600;
    }

    .outro-badge-label {
      font-size: 14px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #7e22ce; /* purple text */
      background: rgba(168, 85, 247, 0.1);
      padding: 4px 12px;
      border-radius: 20px;
      margin-top: -6px;
    }

    .stats-table {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 8px 0;
    }

    .stat-box {
      background: #ffffff;
      border: 1.5px solid #000000;
      border-radius: 12px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      box-shadow: 0 3px 0 #000000;
    }

    .stat-label {
      font-size: 10px;
      opacity: 0.5;
      text-transform: uppercase;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    .stat-value {
      font-size: 16px;
      font-weight: 800;
    }

    /* --- CTA DOWNLOAD BUTTON --- */
    .cta-btn {
      position: relative;
      width: 100%;
      background: linear-gradient(135deg, #10b981, #059669); /* emerald green */
      border: 2px solid #000000;
      color: #ffffff;
      padding: 16px 32px;
      font-size: 18px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-radius: 50px;
      cursor: pointer;
      overflow: hidden;
      box-shadow: 0 5px 0 #000000;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      transition: all 0.2s ease;
      animation: ctaPulse 1.5s ease-in-out infinite alternate;
    }

    .cta-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
      transform: skewX(-25deg);
    }

    .cta-btn.shine::before {
      animation: buttonShine 2.5s ease-in-out infinite;
    }

    @keyframes buttonShine {
      0% { left: -100%; }
      30%, 100% { left: 150%; }
    }

    @keyframes ctaPulse {
      0% { transform: scale(1); }
      100% { transform: scale(1.04); }
    }

    .cta-btn:active {
      transform: translateY(2px) scale(0.98);
      box-shadow: 0 2px 0 #000000;
    }

    .cta-arrow {
      animation: arrowBounce 0.5s ease-in-out infinite alternate;
    }

    @keyframes arrowBounce {
      from { transform: translateX(0); }
      to { transform: translateX(4px); }
    }

    .secondary-cta {
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0.5;
      cursor: pointer;
      transition: opacity 0.2s ease;
      color: #000000;
    }

    .secondary-cta:hover {
      opacity: 0.9;
    }

    /* --- TUTORIAL HAND ANIMATION --- */
    .tutorial-hand {
      position: absolute;
      width: 48px;
      height: 48px;
      pointer-events: none;
      z-index: 50;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .tutorial-hand.active {
      opacity: 1;
      animation: handDrag 3s ease infinite;
    }

    @keyframes handDrag {
      0% {
        top: 34.6%; 
        left: 50%;
        transform: translate(-50%, -50%) scale(1.1);
      }
      20% {
        top: 34.6%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.9);
      }
      50% {
        top: 42.3%; 
        left: 61.1%;
        transform: translate(-50%, -50%) scale(0.9);
      }
      70%, 100% {
        top: 42.3%;
        left: 61.1%;
        transform: translate(-50%, -50%) scale(1.1);
        opacity: 0;
      }
    }

    /* SVG Hand drawing */
    .hand-icon {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
    }

    /* --- ANGRY MODE BRANDING STYLE OVERRIDES --- */
    #app-container.angry-mode {
      --app-bg: #1e0505;
      --grid-border-color: #ff3333;
      box-shadow: 0 10px 40px rgba(255, 0, 0, 0.25);
    }

    #app-container.angry-mode .header-panel,
    #app-container.angry-mode .gameplay-area,
    #app-container.angry-mode .footer-panel {
      background-color: #1e0505 !important;
      color: #ff3333 !important;
    }

    #app-container.angry-mode .separator-line {
      background-color: #ff3333 !important;
    }

    #app-container.angry-mode .mission-title,
    #app-container.angry-mode .target-title {
      color: #ff3333 !important;
    }

    #app-container.angry-mode .score-capsule {
      background: #2d0d0d !important;
      border-color: #ff3333 !important;
      color: #ff3333 !important;
      box-shadow: 0 3px 0 #ff3333 !important;
    }

    #app-container.angry-mode .ai-analyzer {
      background: #2d0d0d !important;
      border-color: #ff3333 !important;
      box-shadow: 0 3px 0 #ff3333 !important;
    }

    #app-container.angry-mode .ai-energy-bar {
      background: linear-gradient(90deg, #ef4444, #ff0000) !important;
    }

    #app-container.angry-mode .grid-cell {
      background-color: #2d0d0d !important;
      border-color: #ff3333 !important;
      color: #ff6666 !important;
    }

    #app-container.angry-mode .grid-cell.selected {
      background-color: #ff3333 !important;
      color: #ffffff !important;
      border-color: #ffffff !important;
      box-shadow: 0 0 12px rgba(255, 51, 51, 0.8) !important;
    }

    #app-container.angry-mode .footer-info {
      color: #ff3333 !important;
    }

    #app-container.angry-mode .control-btn {
      color: #ff3333 !important;
    }

    #app-container.angry-mode #connector-svg .connector-line {
      stroke: #ff3333 !important;
    }
  </style>
</head>
<body>

  <div id="app-container">
    <!-- Particle canvas background -->
    <canvas id="particles-canvas"></canvas>

    <!-- Header / Stats Info -->
    <div class="header-panel">
      <div class="mission-title">Find Pairs and Sums of 10</div>
      <div class="target-title">Mission Target: 100</div>
      <div class="score-capsule" id="score-box">
        <span>Score:</span>
        <span class="score-val" id="score-label">0</span>
      </div>

      <!-- AI Performance Analyzer -->
      <div class="ai-analyzer">
        <div class="ai-badge tier-learner" id="ai-badge-tier">
          <span class="ai-dot">🟢</span>
          <span id="ai-tier-text">Quick Learner</span>
        </div>
        <div class="ai-energy-wrapper">
          <div class="ai-energy-bar" id="ai-energy-gauge"></div>
        </div>
        <div class="ai-emoji" id="ai-emoji-face">😀</div>
      </div>
    </div>

    <!-- Separator -->
    <div class="separator-line"></div>

    <!-- Gameplay grid area -->
    <div class="gameplay-area" id="gameplay-viewport">
      <!-- Grid Container -->
      <div class="board-container" id="grid-board"></div>
      
      <!-- SVG overlay for rendering lines -->
      <svg id="connector-svg">
        <line id="connection-line" class="connector-line" x1="0" y1="0" x2="0" y2="0" style="display:none;" />
      </svg>
    </div>

    <!-- Emotion Engine Popups Container -->
    <div class="emotion-overlay" id="emotion-layer"></div>

    <!-- Combo streak badge -->
    <div class="combo-badge-overlay" id="combo-popup">x2</div>

    <!-- Outro / CTA View -->
    <div id="cta-overlay">
      <div class="outro-card">
        <div class="outro-title">Number Match</div>
        
        <!-- 3x3 Board Icon (from reference Outro) -->
        <div class="icon-grid-display">
          <div class="icon-cell">4</div>
          <div class="icon-cell">2</div>
          <div class="icon-cell">4</div>
          <div class="icon-cell">9</div>
          <div class="icon-cell match-highlight">3</div>
          <div class="icon-cell match-highlight">3</div>
          <div class="icon-cell">7</div>
          <div class="icon-cell">9</div>
          <div class="icon-cell">3</div>
        </div>

        <div class="outro-badge-label" id="outro-tier-label">Math Master</div>
        
        <!-- Stats table -->
        <div class="stats-table">
          <div class="stat-box">
            <span class="stat-label">Final Score</span>
            <span class="stat-value" id="stat-final-score">90</span>
          </div>
          <div class="stat-box">
            <span class="stat-label">Accuracy</span>
            <span class="stat-value" id="stat-accuracy">100%</span>
          </div>
          <div class="stat-box">
            <span class="stat-label">Max Streak</span>
            <span class="stat-value" id="stat-max-combo">x5</span>
          </div>
          <div class="stat-box">
            <span class="stat-label">XP Earned</span>
            <span class="stat-value" id="stat-xp">900 XP</span>
          </div>
        </div>

        <!-- Call to Action Main Button -->
        <button class="cta-btn shine" id="install-btn">
          <span>Install Now</span>
          <span class="cta-arrow">➔</span>
        </button>

        <div class="secondary-cta" id="continue-btn">Continue Playing</div>
      </div>
    </div>

    <!-- Footer Controls -->
    <div class="footer-panel">
      <div class="footer-info">Target Score: 100</div>
      <button class="control-btn" id="mute-btn" title="Toggle Sound">
        <!-- SVG Speaker Icon -->
        <svg id="speaker-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07" class="sound-wave"></path>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14" class="sound-wave"></path>
        </svg>
      </button>
    </div>

    <!-- Tutorial Hand overlay -->
    <div class="tutorial-hand" id="tutorial-indicator">
      <!-- Standard SVG hand cursor -->
      <svg class="hand-icon" viewBox="0 0 32 32">
        <path d="M16,2c0,0-2,0-2,2v10c0,0,0,1-1,1s-1-1-1-1V7c0,0-1.5,0-1.5,1.5v6.5c0,0,0,1-1,1s-1-1-1-1v-4 c0,0-1.5,0-1.5,1.5V20c0,5,4,8,8,8s8-3,8-8V10C19,10,18,10,18,11.5v5c0,0,0,1-1,1s-1-1-1-1V2" fill="#fff" stroke="#000" stroke-width="2" stroke-linecap="round" />
      </svg>
    </div>
  </div>

  <!-- --- JAVASCRIPT PLAYABLE AD SDK --- -->
  <script>
    // ==========================================
    // 1. CONFIGURATION SYSTEM
    // ==========================================
    const SDK_CONFIG = {
      gameName: "Number Match",
      targetScore: 100,
      ctaLimitSeconds: 20,
      redirectURL: "https://play.google.com/store/apps/details?id=com.ezygamers.sumlinknumbergame&hl=en_IN",
      theme: "light", 
      difficulty: "normal",
      board: {
        columns: 9,
        rows: 13,
        initialGrid: [
          [7, 1, 3, 8, 1, 3, 1, 1, 2],
          [1, 2, 2, 8, 1, 2, 1, 7, 2],
          [1, 1, 3, 5, 1, 5, 7, 3, 1],
          [7, 1, 1, 7, 9, 3, 1, 1, 1],
          [3, 7, 9, 1, 1, 1, 3, 5, 5],
          [1, 1, 7, 2, 2, 1, 8, 9, 1],
          [3, 9, 7, 6, 3, 3, 1, 1, 1],
          [1, 7, 1, 7, 5, 7, 6, 2, 1],
          [8, 1, 4, 4, 1, 1, 1, 2, 8],
          [1, 8, 6, 1, 1, 6, 1, 3, 8],
          [2, 1, 6, 4, 4, 1, 7, 1, 3],
          [9, 2, 9, 1, 8, 1, 3, 1, 1],
          [1, 1, 1, 8, 1, 9, 1, 7, 1]
        ]
      }
    };

    // ==========================================
    // 2. ANALYTICS ENGINE
    // ==========================================
    const AnalyticsEngine = {
      startTime: 0,
      firstInteraction: false,
      
      init() {
        this.startTime = Date.now();
        this.track("game_started");
      },
      
      track(eventName, data = {}) {
        const elapsed = ((Date.now() - this.startTime) / 1000).toFixed(2);
        const payload = {
          event: eventName,
          timeSinceStart: `${elapsed}s`,
          ...data
        };
        console.log(`%c[Analytics] ${eventName.toUpperCase()}`, "color: #10b981; font-weight: bold;", payload);
      }
    };

    // ==========================================
    // 3. AUDIO ENGINE (Synthesized Audio Synth)
    // ==========================================
    const AudioEngine = {
      ctx: null,
      muted: false,
      
      init() {
        if (this.ctx) return;
        try {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          this.ctx = new AudioContext();
        } catch (e) {
          console.warn("Web Audio API not supported", e);
        }
      },
      
      resume() {
        if (this.ctx && this.ctx.state === "suspended") {
          this.ctx.resume();
        }
      },
      
      toggleMute() {
        this.muted = !this.muted;
        this.resume();
        const icon = document.getElementById("speaker-icon");
        const waves = icon.querySelectorAll(".sound-wave");
        if (this.muted) {
          waves.forEach(w => w.style.display = "none");
          AnalyticsEngine.track("audio_muted");
        } else {
          waves.forEach(w => w.style.display = "block");
          AnalyticsEngine.track("audio_unmuted");
        }
      },
      
      playTone(freq, type, duration, delay = 0) {
        if (this.muted || !this.ctx) return;
        this.resume();
        
        setTimeout(() => {
          try {
            const osc = this.ctx.createOscillator();
            const gainNode = this.ctx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(this.ctx.destination);
            
            osc.type = type;
            osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
            
            gainNode.gain.setValueAtTime(0.12, this.ctx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + duration);
            
            osc.start();
            osc.stop(this.ctx.currentTime + duration);
          } catch (e) {
            // Audio execution safe catch
          }
        }, delay * 1000);
      },
      
      playCorrect() {
        this.playTone(523.25, "sine", 0.18, 0); // C5
        this.playTone(659.25, "sine", 0.18, 0.08); // E5
        this.playTone(783.99, "sine", 0.35, 0.16); // G5
      },
      
      playWrong() {
        if (this.muted || !this.ctx) return;
        this.resume();
        try {
          const osc = this.ctx.createOscillator();
          const gainNode = this.ctx.createGain();
          osc.connect(gainNode);
          gainNode.connect(this.ctx.destination);
          
          osc.type = "sawtooth";
          osc.frequency.setValueAtTime(180, this.ctx.currentTime);
          osc.frequency.linearRampToValueAtTime(90, this.ctx.currentTime + 0.35);
          
          gainNode.gain.setValueAtTime(0.15, this.ctx.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + 0.35);
          
          osc.start();
          osc.stop(this.ctx.currentTime + 0.35);
        } catch (e) {}
      },
      
      playAngryWarning() {
        if (this.muted || !this.ctx) return;
        this.resume();
        try {
          const now = this.ctx.currentTime;
          const osc1 = this.ctx.createOscillator();
          const osc2 = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          
          osc1.connect(gain);
          osc2.connect(gain);
          gain.connect(this.ctx.destination);
          
          osc1.type = "sawtooth";
          osc2.type = "sawtooth";
          
          osc1.frequency.setValueAtTime(100, now);
          osc1.frequency.linearRampToValueAtTime(160, now + 0.3);
          osc1.frequency.linearRampToValueAtTime(100, now + 0.6);
          
          osc2.frequency.setValueAtTime(104, now);
          osc2.frequency.linearRampToValueAtTime(164, now + 0.3);
          osc2.frequency.linearRampToValueAtTime(104, now + 0.6);
          
          gain.gain.setValueAtTime(0.2, now);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.65);
          
          osc1.start();
          osc2.start();
          osc1.stop(now + 0.65);
          osc2.stop(now + 0.65);
        } catch(e) {}
      },
      
      playCombo(streak) {
        const pitchMultiplier = 1 + (streak * 0.1);
        this.playTone(440 * pitchMultiplier, "sine", 0.15, 0);
        this.playTone(554.37 * pitchMultiplier, "sine", 0.15, 0.05);
        this.playTone(659.25 * pitchMultiplier, "sine", 0.3, 0.10);
      },
      
      playClick() {
        this.playTone(600, "sine", 0.08, 0);
      },
      
      playVictory() {
        const notes = [523, 659, 783, 1046];
        notes.forEach((freq, idx) => {
          this.playTone(freq, "sine", 0.35, idx * 0.08);
        });
      }
    };

    // ==========================================
    // 4. PARTICLE ENGINE (HTML5 Canvas Particles)
    // ==========================================
    const ParticleEngine = {
      canvas: null,
      ctx: null,
      particles: [],
      animationFrameId: null,
      
      init() {
        this.canvas = document.getElementById("particles-canvas");
        this.ctx = this.canvas.getContext("2d");
        this.resize();
        window.addEventListener("resize", () => this.resize());
        this.loop();
      },
      
      resize() {
        const rect = this.canvas.parentElement.getBoundingClientRect();
        this.canvas.width = rect.width;
        this.canvas.height = rect.height;
      },
      
      spawn(x, y, color, count, type = "sparkle") {
        for (let i = 0; i < count; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = type === "smoke" ? Math.random() * 0.8 + 0.4 : Math.random() * 3 + 1.5;
          this.particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed + (type === "sparkle" ? -0.5 : -0.1),
            color,
            radius: type === "confetti" ? Math.random() * 4 + 2.5 : Math.random() * 2 + 1,
            alpha: 1,
            decay: type === "smoke" ? 0.015 : Math.random() * 0.02 + 0.015,
            type,
            rotation: Math.random() * Math.PI * 2,
            rotSpeed: (Math.random() - 0.5) * 0.08
          });
        }
      },
      
      spawnSparkles(x, y, color = "#ffaa00") {
        this.spawn(x, y, color, 12, "sparkle");
      },
      
      spawnSmoke(x, y) {
        this.spawn(x, y, "rgba(180,180,180,0.4)", 6, "smoke");
      },
      
      spawnConfetti() {
        const colors = ["#ffaa00", "#3b82f6", "#10b981", "#ef4444", "#a855f7"];
        const containerWidth = this.canvas.width;
        for (let i = 0; i < 30; i++) {
          const startX = Math.random() * containerWidth;
          this.particles.push({
            x: startX,
            y: -10,
            vx: (Math.random() - 0.5) * 1.5,
            vy: Math.random() * 2 + 1.5,
            color: colors[Math.floor(Math.random() * colors.length)],
            radius: Math.random() * 5 + 3,
            alpha: 1,
            decay: Math.random() * 0.008 + 0.004,
            type: "confetti",
            rotation: Math.random() * Math.PI * 2,
            rotSpeed: (Math.random() - 0.5) * 0.06
          });
        }
      },
      
      update() {
        for (let i = this.particles.length - 1; i >= 0; i--) {
          const p = this.particles[i];
          p.x += p.vx;
          p.y += p.vy;
          p.alpha -= p.decay;
          p.rotation += p.rotSpeed;
          
          if (p.alpha <= 0) {
            this.particles.splice(i, 1);
          }
        }
      },
      
      draw() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        
        for (let i = 0; i < this.particles.length; i++) {
          const p = this.particles[i];
          this.ctx.save();
          this.ctx.globalAlpha = p.alpha;
          this.ctx.fillStyle = p.color;
          
          if (p.type === "confetti") {
            this.ctx.translate(p.x, p.y);
            this.ctx.rotate(p.rotation);
            this.ctx.fillRect(-p.radius, -p.radius / 2, p.radius * 2, p.radius);
          } else if (p.type === "smoke") {
            this.ctx.beginPath();
            this.ctx.arc(p.x, p.y, p.radius * (2.2 - p.alpha), 0, Math.PI * 2);
            this.ctx.fill();
          } else {
            this.ctx.beginPath();
            this.ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            this.ctx.fill();
          }
          this.ctx.restore();
        }
      },
      
      loop() {
        this.update();
        this.draw();
        
        // Spawn red sparks periodically from bottom of board in Angry Mode
        if (GameEngine && GameEngine.isAngryMode && Math.random() < 0.22) {
          const w = this.canvas.width;
          const h = this.canvas.height;
          const startX = Math.random() * w;
          const startY = h - 60;
          this.spawn(startX, startY, "rgba(255, 51, 51, 0.8)", 1, "sparkle");
        }
        
        this.animationFrameId = requestAnimationFrame(() => this.loop());
      }
    };

    // ==========================================
    // 5. EMOTION ENGINE
    // ==========================================
    const EmotionEngine = {
      layer: null,
      positiveEmojis: ["😀", "😎", "🤩", "🔥", "👑", "👍", "🎉"],
      negativeEmojis: ["😕", "😢", "😭", "🤯", "👎", "❌"],
      angryEmojis: ["😡", "🤬", "🔥", "👿", "💥"],
      
      init() {
        this.layer = document.getElementById("emotion-layer");
      },
      
      spawnEmoji(x, y, type = "positive") {
        let list;
        if (type === "positive") {
          list = this.positiveEmojis;
        } else if (type === "angry") {
          list = this.angryEmojis;
        } else {
          list = this.negativeEmojis;
        }
        
        const emoji = list[Math.floor(Math.random() * list.length)];
        
        const el = document.createElement("div");
        el.className = "emotion-emoji";
        el.innerText = emoji;
        el.style.left = `${x}px`;
        el.style.top = `${y}px`;
        
        this.layer.appendChild(el);
        setTimeout(() => el.remove(), 1300);
      }
    };

    // ==========================================
    // 6. SCORE & TIMER ENGINE
    // ==========================================
    const ScoreEngine = {
      score: 0,
      visualScore: 0,
      targetScore: 100,
      accuracy: { correct: 0, total: 0 },
      streak: 0,
      maxStreak: 0,
      scoreLabel: null,
      scoreBox: null,
      
      init() {
        this.scoreLabel = document.getElementById("score-label");
        this.scoreBox = document.getElementById("score-box");
        this.targetScore = SDK_CONFIG.targetScore;
      },
      
      addScore(amount) {
        this.score += amount;
        this.accuracy.correct++;
        this.accuracy.total++;
        this.streak++;
        if (this.streak > this.maxStreak) {
          this.maxStreak = this.streak;
        }
        
        // Recover from Angry Mode if active
        if (GameEngine.isAngryMode) {
          GameEngine.clearAngryMode();
        } else {
          GameEngine.consecutiveMisses = 0;
        }
        
        this.animateScore();
        this.triggerPulse();
        
        if (this.streak >= 2) {
          ComboSystem.show(this.streak);
        }
        
        AnalyticsEngine.track("correct_match", {
          score: this.score,
          streak: this.streak,
          accuracy: this.getAccuracyPercent()
        });
        
        if (this.score >= this.targetScore) {
          setTimeout(() => GameEngine.completeGame(), 600);
        }
      },
      
      registerMiss() {
        this.accuracy.total++;
        this.streak = 0;
        
        // Track consecutive misses for Angry Mode
        GameEngine.consecutiveMisses++;
        
        if (GameEngine.consecutiveMisses >= 3) {
          GameEngine.triggerAngryMode();
        } else {
          AudioEngine.playWrong();
        }
        
        AnalyticsEngine.track("wrong_match", {
          accuracy: this.getAccuracyPercent(),
          consecutiveMisses: GameEngine.consecutiveMisses
        });
      },
      
      getAccuracyPercent() {
        if (this.accuracy.total === 0) return "100%";
        return `${Math.round((this.accuracy.correct / this.accuracy.total) * 100)}%`;
      },
      
      animateScore() {
        const step = () => {
          if (this.visualScore < this.score) {
            this.visualScore += Math.ceil((this.score - this.visualScore) * 0.15);
            if (this.visualScore > this.score) this.visualScore = this.score;
            this.scoreLabel.innerText = this.visualScore;
            requestAnimationFrame(step);
          }
        };
        requestAnimationFrame(step);
      },
      
      triggerPulse() {
        this.scoreBox.classList.add("pulse");
        setTimeout(() => this.scoreBox.classList.remove("pulse"), 250);
      }
    };

    const TimerEngine = {
      startTime: 0,
      duration: 20000, 
      timerId: null,
      paused: false,
      
      start(callback) {
        this.startTime = Date.now();
        this.duration = SDK_CONFIG.ctaLimitSeconds * 1000;
        
        this.timerId = setTimeout(() => {
          if (!this.paused) {
            callback();
          }
        }, this.duration);
      },
      
      pause() {
        this.paused = true;
        clearTimeout(this.timerId);
      }
    };

    // ==========================================
    // 7. COMBO SYSTEM
    // ==========================================
    const ComboSystem = {
      popup: null,
      
      init() {
        this.popup = document.getElementById("combo-popup");
      },
      
      show(streak) {
        this.popup.innerText = `x${streak}`;
        this.popup.className = "combo-badge-overlay active";
        AudioEngine.playCombo(streak);
        
        if (streak >= 3) {
          document.getElementById("app-container").classList.add("shake");
          setTimeout(() => document.getElementById("app-container").classList.remove("shake"), 350);
        }
        if (streak >= 4) {
          ParticleEngine.spawnConfetti();
        }
        
        setTimeout(() => {
          this.popup.className = "combo-badge-overlay";
        }, 1100);
      }
    };

    // ==========================================
    // 8. AI PERFORMANCE ANALYZER
    // ==========================================
    const AIAnalyzer = {
      energy: 50,
      visualEnergy: 50,
      tierBadge: null,
      tierText: null,
      energyGauge: null,
      emojiFace: null,
      
      init() {
        this.tierBadge = document.getElementById("ai-badge-tier");
        this.tierText = document.getElementById("ai-tier-text");
        this.energyGauge = document.getElementById("ai-energy-gauge");
        this.emojiFace = document.getElementById("ai-emoji-face");
        this.updateVisuals();
      },
      
      addEnergy(amount) {
        this.energy = Math.min(100, this.energy + amount);
        this.animateGauge();
      },
      
      deductEnergy(amount) {
        this.energy = Math.max(0, this.energy - amount);
        this.animateGauge();
      },
      
      animateGauge() {
        const step = () => {
          const diff = this.energy - this.visualEnergy;
          if (Math.abs(diff) > 0.5) {
            this.visualEnergy += diff * 0.12;
            this.energyGauge.style.width = `${this.visualEnergy}%`;
            this.updateVisuals();
            requestAnimationFrame(step);
          } else {
            this.visualEnergy = this.energy;
            this.energyGauge.style.width = `${this.energy}%`;
            this.updateVisuals();
          }
        };
        requestAnimationFrame(step);
      },
      
      updateVisuals() {
        // Skip normal updates if currently in Angry Mode
        if (GameEngine && GameEngine.isAngryMode) return;
        
        if (this.visualEnergy < 40) {
          this.tierText.innerText = "Quick Learner";
          this.tierBadge.className = "ai-badge tier-learner";
          this.tierBadge.querySelector(".ai-dot").innerText = "🟢";
          this.emojiFace.innerText = "😕";
        } else if (this.visualEnergy < 78) {
          this.tierText.innerText = "Puzzle Solver";
          this.tierBadge.className = "ai-badge tier-solver";
          this.tierBadge.querySelector(".ai-dot").innerText = "🔵";
          this.emojiFace.innerText = "😎";
        } else {
          this.tierText.innerText = "Math Master";
          this.tierBadge.className = "ai-badge tier-master";
          this.tierBadge.querySelector(".ai-dot").innerText = "🟣";
          this.emojiFace.innerText = "🤩";
        }
      }
    };

    // ==========================================
    // 9. GAME ENGINE (Issue 2 Implemented: Click + Drag Controller)
    // ==========================================
    const GameEngine = {
      grid: [],
      selectedCells: [],
      selectedStartCell: null,
      viewportEl: null,
      boardEl: null,
      connectorSvg: null,
      connectionLine: null,
      isDrawing: false,
      dragActive: false,
      dragStartPos: { x: 0, y: 0 },
      gameActive: true,
      tutorialCompleted: false,
      
      // Angry Mode Variables
      consecutiveMisses: 0,
      isAngryMode: false,
      
      init() {
        this.viewportEl = document.getElementById("gameplay-viewport");
        this.boardEl = document.getElementById("grid-board");
        this.connectorSvg = document.getElementById("connector-svg");
        this.connectionLine = document.getElementById("connection-line");
        
        // Build coordinates matching reference grid exactly
        const initial = SDK_CONFIG.board.initialGrid;
        for (let r = 0; r < SDK_CONFIG.board.rows; r++) {
          this.grid[r] = [];
          for (let c = 0; c < SDK_CONFIG.board.columns; c++) {
            this.grid[r][c] = {
              value: initial[r] ? initial[r][c] : null,
              row: r,
              col: c
            };
          }
        }
        
        this.renderBoard();
        this.setupInputHandlers();
        
        // Start hand indicator overlay
        if (!this.tutorialCompleted) {
          document.getElementById("tutorial-indicator").classList.add("active");
        }
      },
      
      renderBoard() {
        // Clear old cells
        const cellNodes = this.boardEl.querySelectorAll(".grid-cell");
        cellNodes.forEach(n => n.remove());
        
        for (let r = 0; r < SDK_CONFIG.board.rows; r++) {
          for (let c = 0; c < SDK_CONFIG.board.columns; c++) {
            const cellData = this.grid[r][c];
            const cellEl = document.createElement("button");
            cellEl.id = `cell-${r}-${c}`;
            cellEl.className = "grid-cell";
            cellEl.dataset.row = r;
            cellEl.dataset.col = c;
            
            if (cellData.value === null) {
              cellEl.className = "grid-cell empty";
            } else {
              cellEl.innerText = cellData.value;
            }
            
            // Reapply selection visuals if cell matches the currently active click selection
            if (this.selectedStartCell && parseInt(this.selectedStartCell.dataset.row) === r && parseInt(this.selectedStartCell.dataset.col) === c) {
              cellEl.classList.add("selected");
            }
            
            this.boardEl.appendChild(cellEl);
          }
        }
      },
      
      getCellCenter(cellEl) {
        const boardRect = this.boardEl.getBoundingClientRect();
        const cellRect = cellEl.getBoundingClientRect();
        return {
          x: cellRect.left - boardRect.left + cellRect.width / 2,
          y: cellRect.top - boardRect.top + cellRect.height / 2
        };
      },
      
      setupInputHandlers() {
        const handleStart = (e) => {
          if (!this.gameActive) return;
          AudioEngine.init();
          
          const cellEl = e.target.closest(".grid-cell");
          if (!cellEl || cellEl.classList.contains("empty")) return;
          
          this.isDrawing = true;
          this.dragActive = false;
          
          const clientX = e.touches ? e.touches[0].clientX : e.clientX;
          const clientY = e.touches ? e.touches[0].clientY : e.clientY;
          this.dragStartPos = { x: clientX, y: clientY };
          
          // Selection initiation
          if (this.selectedStartCell) {
            // Already have a start cell selected via tap-to-select
            if (cellEl !== this.selectedStartCell) {
              this.selectedCells = [this.selectedStartCell, cellEl];
              cellEl.classList.add("selected");
              
              const startCenter = this.getCellCenter(this.selectedStartCell);
              const targetCenter = this.getCellCenter(cellEl);
              this.connectionLine.setAttribute("x1", startCenter.x);
              this.connectionLine.setAttribute("y1", startCenter.y);
              this.connectionLine.setAttribute("x2", targetCenter.x);
              this.connectionLine.setAttribute("y2", targetCenter.y);
              this.connectionLine.style.display = "block";
            } else {
              this.selectedCells = [cellEl];
            }
          } else {
            this.selectedCells = [cellEl];
            cellEl.classList.add("selected");
            
            const coords = this.getCellCenter(cellEl);
            this.connectionLine.setAttribute("x1", coords.x);
            this.connectionLine.setAttribute("y1", coords.y);
            this.connectionLine.setAttribute("x2", coords.x);
            this.connectionLine.setAttribute("y2", coords.y);
            this.connectionLine.style.display = "block";
          }
          
          if (!AnalyticsEngine.firstInteraction) {
            AnalyticsEngine.firstInteraction = true;
            AnalyticsEngine.track("first_interaction");
            document.getElementById("tutorial-indicator").classList.remove("active");
            this.tutorialCompleted = true;
          }
        };
        
        const handleMove = (e) => {
          if (!this.isDrawing || this.selectedCells.length === 0) return;
          
          const clientX = e.touches ? e.touches[0].clientX : e.clientX;
          const clientY = e.touches ? e.touches[0].clientY : e.clientY;
          
          const dx = clientX - this.dragStartPos.x;
          const dy = clientY - this.dragStartPos.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          
          if (dist > 10) {
            this.dragActive = true;
          }
          
          if (this.dragActive) {
            const boardRect = this.boardEl.getBoundingClientRect();
            const localX = clientX - boardRect.left;
            const localY = clientY - boardRect.top;
            
            const originCell = this.selectedStartCell || this.selectedCells[0];
            const startCenter = this.getCellCenter(originCell);
            this.connectionLine.setAttribute("x1", startCenter.x);
            this.connectionLine.setAttribute("y1", startCenter.y);
            this.connectionLine.setAttribute("x2", localX);
            this.connectionLine.setAttribute("y2", localY);
            this.connectionLine.style.display = "block";
            
            const element = document.elementFromPoint(clientX, clientY);
            const cellEl = element ? element.closest(".grid-cell") : null;
            
            if (cellEl && !cellEl.classList.contains("empty") && cellEl !== originCell) {
              const targetCenter = this.getCellCenter(cellEl);
              this.connectionLine.setAttribute("x2", targetCenter.x);
              this.connectionLine.setAttribute("y2", targetCenter.y);
              
              if (this.selectedCells.length < 2) {
                this.selectedCells = [originCell, cellEl];
                cellEl.classList.add("selected");
              } else if (this.selectedCells[1] !== cellEl) {
                this.selectedCells[1].classList.remove("selected");
                this.selectedCells[1] = cellEl;
                cellEl.classList.add("selected");
              }
            } else {
              // Dragged off targets
              if (this.selectedCells.length === 2) {
                this.selectedCells[1].classList.remove("selected");
                this.selectedCells.pop();
              }
            }
          }
        };
        
        const handleEnd = () => {
          if (!this.isDrawing) return;
          this.isDrawing = false;
          this.connectionLine.style.display = "none";
          
          const originCell = this.selectedStartCell || this.selectedCells[0];
          
          if (this.dragActive) {
            // Drag Mode Complete
            if (this.selectedCells.length === 2) {
              const cellA = this.selectedCells[0];
              const cellB = this.selectedCells[1];
              
              const rA = parseInt(cellA.dataset.row);
              const cA = parseInt(cellA.dataset.col);
              const rB = parseInt(cellB.dataset.row);
              const cB = parseInt(cellB.dataset.col);
              
              if (this.checkMatch(rA, cA, rB, cB)) {
                this.clearPair(rA, cA, rB, cB);
                this.selectedStartCell = null;
              } else {
                ScoreEngine.registerMiss();
                AIAnalyzer.deductEnergy(15);
                this.triggerMismatchEffects(cellB);
                
                cellA.classList.remove("selected");
                cellB.classList.remove("selected");
                this.selectedStartCell = null;
              }
            } else {
              originCell.classList.remove("selected");
              if (this.selectedStartCell) {
                this.selectedStartCell.classList.remove("selected");
                this.selectedStartCell = null;
              }
            }
          } else {
            // Tap/Click Mode Complete
            const cellEl = this.selectedCells[this.selectedCells.length - 1];
            
            if (!this.selectedStartCell) {
              // Select First Cell
              this.selectedStartCell = cellEl;
              cellEl.classList.add("selected");
              AudioEngine.playClick();
              AnalyticsEngine.track("cell_selected", { row: cellEl.dataset.row, col: cellEl.dataset.col });
            } else {
              // Tap Same Cell -> Deselect
              if (cellEl === this.selectedStartCell) {
                cellEl.classList.remove("selected");
                this.selectedStartCell = null;
                AudioEngine.playClick();
                AnalyticsEngine.track("cell_deselected");
              } else {
                // Tap Second Cell -> Match
                const rA = parseInt(this.selectedStartCell.dataset.row);
                const cA = parseInt(this.selectedStartCell.dataset.col);
                const rB = parseInt(cellEl.dataset.row);
                const cB = parseInt(cellEl.dataset.col);
                
                if (this.checkMatch(rA, cA, rB, cB)) {
                  this.clearPair(rA, cA, rB, cB);
                  this.selectedStartCell = null;
                } else {
                  // Mismatch -> Clear selection 1, highlight selection 2
                  ScoreEngine.registerMiss();
                  AIAnalyzer.deductEnergy(15);
                  this.triggerMismatchEffects(cellEl);
                  
                  this.selectedStartCell.classList.remove("selected");
                  this.selectedStartCell = cellEl;
                  cellEl.classList.add("selected");
                  AudioEngine.playClick();
                }
              }
            }
          }
          
          this.selectedCells = [];
          this.dragActive = false;
        };
        
        // Listeners for mouse
        this.boardEl.addEventListener("mousedown", handleStart);
        window.addEventListener("mousemove", handleMove);
        window.addEventListener("mouseup", handleEnd);
        
        // Listeners for touch
        this.boardEl.addEventListener("touchstart", handleStart, { passive: true });
        window.addEventListener("touchmove", handleMove, { passive: true });
        window.addEventListener("touchend", handleEnd);
      },
      
      checkMatch(r1, c1, r2, c2) {
        const val1 = this.grid[r1][c1].value;
        const val2 = this.grid[r2][c2].value;
        
        if (val1 === null || val2 === null) return false;
        
        const isSum10 = (val1 + val2 === 10);
        const isSame = (val1 === val2);
        if (!isSum10 && !isSame) return false;
        
        if (this.checkDirectAdjacency(r1, c1, r2, c2)) return true;
        if (this.checkWrapAroundAdjacency(r1, c1, r2, c2)) return true;
        
        return false;
      },
      
      checkDirectAdjacency(r1, c1, r2, c2) {
        const dr = Math.sign(r2 - r1);
        const dc = Math.sign(c2 - c1);
        
        const isHorizontal = (r1 === r2);
        const isVertical = (c1 === c2);
        const isDiagonal = (Math.abs(r2 - r1) === Math.abs(c2 - c1));
        
        if (!isHorizontal && !isVertical && !isDiagonal) return false;
        
        let cr = r1 + dr;
        let cc = c1 + dc;
        
        while (cr !== r2 || cc !== c2) {
          if (this.grid[cr][cc].value !== null) {
            return false;
          }
          cr += dr;
          cc += dc;
        }
        
        return true;
      },
      
      checkWrapAroundAdjacency(r1, c1, r2, c2) {
        const activeCells = [];
        for (let r = 0; r < SDK_CONFIG.board.rows; r++) {
          for (let c = 0; c < SDK_CONFIG.board.columns; c++) {
            if (this.grid[r][c].value !== null) {
              activeCells.push(this.grid[r][c]);
            }
          }
        }
        
        const idx1 = activeCells.findIndex(cell => cell.row === r1 && cell.col === c1);
        const idx2 = activeCells.findIndex(cell => cell.row === r2 && cell.col === c2);
        
        if (idx1 === -1 || idx2 === -1) return false;
        
        return Math.abs(idx1 - idx2) === 1;
      },
      
      clearPair(r1, c1, r2, c2) {
        const val1 = this.grid[r1][c1].value;
        const val2 = this.grid[r2][c2].value;
        
        this.grid[r1][c1].value = null;
        this.grid[r2][c2].value = null;
        
        AudioEngine.playCorrect();
        
        const elA = document.getElementById(`cell-${r1}-${c1}`);
        const elB = document.getElementById(`cell-${r2}-${c2}`);
        
        elA.classList.remove("selected");
        elB.classList.remove("selected");
        
        const rectA = elA.getBoundingClientRect();
        const rectB = elB.getBoundingClientRect();
        const appRect = document.getElementById("app-container").getBoundingClientRect();
        
        const centerX_A = rectA.left - appRect.left + rectA.width / 2;
        const centerY_A = rectA.top - appRect.top + rectA.height / 2;
        const centerX_B = rectB.left - appRect.left + rectB.width / 2;
        const centerY_B = rectB.top - appRect.top + rectB.height / 2;
        
        ParticleEngine.spawnSparkles(centerX_A, centerY_A, "#ffaa00");
        ParticleEngine.spawnSparkles(centerX_B, centerY_B, "#ffaa00");
        
        this.spawnFloatingScore(`+10`, (centerX_A + centerX_B)/2, (centerY_A + centerY_B)/2);
        this.spawnFloatingScore(`+50 XP`, (centerX_A + centerX_B)/2 + 20, (centerY_A + centerY_B)/2 - 15, true);
        
        EmotionEngine.spawnEmoji((rectA.left + rectB.left)/2 - appRect.left + rectA.width/2, (rectA.top + rectB.top)/2 - appRect.top, "positive");
        
        ScoreEngine.addScore(10);
        AIAnalyzer.addEnergy(10);
        
        setTimeout(() => this.applyGravity(), 120);
      },
      
      applyGravity() {
        const cols = SDK_CONFIG.board.columns;
        const rows = SDK_CONFIG.board.rows;
        
        for (let c = 0; c < cols; c++) {
          let writeRow = rows - 1;
          for (let readRow = rows - 1; readRow >= 0; readRow--) {
            if (this.grid[readRow][c].value !== null) {
              this.grid[writeRow][c].value = this.grid[readRow][c].value;
              if (writeRow !== readRow) {
                this.grid[readRow][c].value = null;
              }
              writeRow--;
            }
          }
        }
        
        this.renderBoard();
      },
      
      triggerAngryMode() {
        if (this.isAngryMode) return;
        this.isAngryMode = true;
        
        // Trigger crimson-black container overrides
        document.getElementById("app-container").classList.add("angry-mode");
        
        // Update AI badge/labels to critical warnings
        const tierBadge = document.getElementById("ai-badge-tier");
        const tierText = document.getElementById("ai-tier-text");
        const emojiFace = document.getElementById("ai-emoji-face");
        
        tierBadge.className = "ai-badge tier-learner"; // custom overrides applied by CSS
        tierBadge.style.background = "rgba(239, 68, 68, 0.15)";
        tierBadge.style.border = "1px solid #ff3333";
        tierText.innerText = "UNSTABLE STATE";
        tierText.style.color = "#ff3333";
        tierBadge.querySelector(".ai-dot").innerText = "🔴";
        emojiFace.innerText = "🤬";
        
        // Deep buzzer warning
        AudioEngine.playAngryWarning();
        
        // Spawn floating critical banner
        const boardRect = this.boardEl.getBoundingClientRect();
        this.spawnFloatingScore("😡 ANGRY MODE", boardRect.width/2, boardRect.height/2);
        
        AnalyticsEngine.track("angry_mode_entered");
      },
      
      clearAngryMode() {
        if (!this.isAngryMode) return;
        this.isAngryMode = false;
        this.consecutiveMisses = 0;
        
        // Revert class styles
        document.getElementById("app-container").classList.remove("angry-mode");
        
        // Clear style overrides
        const tierBadge = document.getElementById("ai-badge-tier");
        const tierText = document.getElementById("ai-tier-text");
        tierBadge.style.background = "";
        tierBadge.style.border = "";
        tierText.style.color = "";
        
        AIAnalyzer.updateVisuals();
        
        // Calm victory sound recovery
        AudioEngine.playVictory();
        
        // Spawn calm badge
        const boardRect = this.boardEl.getBoundingClientRect();
        this.spawnFloatingScore("😎 CALM DOWN!", boardRect.width/2, boardRect.height/2);
        
        AnalyticsEngine.track("angry_mode_exited");
      },
      
      triggerMismatchEffects(cellEl) {
        this.viewportEl.classList.add("red-flash");
        document.getElementById("app-container").classList.add("shake");
        setTimeout(() => {
          this.viewportEl.classList.remove("red-flash");
          document.getElementById("app-container").classList.remove("shake");
        }, 350);
        
        const rect = cellEl.getBoundingClientRect();
        const appRect = document.getElementById("app-container").getBoundingClientRect();
        
        const emojiType = this.isAngryMode ? "angry" : "negative";
        EmotionEngine.spawnEmoji(rect.left - appRect.left + rect.width/2, rect.top - appRect.top, emojiType);
      },
      
      spawnFloatingScore(text, x, y, isXp = false) {
        const el = document.createElement("div");
        el.className = `floating-text ${isXp ? 'floating-xp' : ''}`;
        el.innerText = text;
        el.style.left = `${x}px`;
        el.style.top = `${y}px`;
        
        document.getElementById("app-container").appendChild(el);
        setTimeout(() => el.remove(), 1000);
      },
      
      completeGame() {
        if (!this.gameActive) return;
        this.gameActive = false;
        TimerEngine.pause();
        
        // If in Angry Mode, clear it before outro to display correct styling
        this.clearAngryMode();
        
        AudioEngine.playVictory();
        CTAEngine.showOutro(true);
      }
    };

    // ==========================================
    // 10. CTA ENGINE (Issue 3: Play Store Redirect Config)
    // ==========================================
    const CTAEngine = {
      overlay: null,
      
      init() {
        this.overlay = document.getElementById("cta-overlay");
        
        document.getElementById("install-btn").addEventListener("click", () => this.triggerRedirect());
        document.getElementById("continue-btn").addEventListener("click", () => this.triggerRedirect());
      },
      
      showOutro(won = false) {
        TimerEngine.pause();
        GameEngine.gameActive = false;
        
        const finalScore = ScoreEngine.score;
        const accuracy = ScoreEngine.getAccuracyPercent();
        const maxStreak = ScoreEngine.maxStreak;
        const xpEarned = finalScore * 10;
        
        document.getElementById("stat-final-score").innerText = finalScore;
        document.getElementById("stat-accuracy").innerText = accuracy;
        document.getElementById("stat-max-combo").innerText = `x${maxStreak}`;
        document.getElementById("stat-xp").innerText = `${xpEarned} XP`;
        
        const currentTier = document.getElementById("ai-tier-text").innerText;
        document.getElementById("outro-tier-label").innerText = currentTier;
        
        this.overlay.classList.add("active");
        ParticleEngine.spawnConfetti();
        
        AnalyticsEngine.track("cta_viewed", {
          score: finalScore,
          accuracy,
          maxStreak,
          skillTier: currentTier
        });
      },
      
      triggerRedirect() {
        AnalyticsEngine.track("cta_clicked");
        const url = SDK_CONFIG.redirectURL || "https://play.google.com/store/apps/details?id=com.ezygamers.sumlinknumbergame&hl=en_IN";
        console.log(`Redirecting to: ${url}`);
        
        if (typeof mraid !== "undefined" && mraid.open) {
          mraid.open(url);
        } else {
          window.open(url, "_blank");
        }
      }
    };

    // ==========================================
    // 11. BOOTSTRAP INITIALIZATION
    // ==========================================
    window.addEventListener("DOMContentLoaded", () => {
      AnalyticsEngine.init();
      AudioEngine.init();
      ParticleEngine.init();
      EmotionEngine.init();
      ScoreEngine.init();
      ComboSystem.init();
      AIAnalyzer.init();
      GameEngine.init();
      CTAEngine.init();
      
      document.getElementById("mute-btn").addEventListener("click", () => {
        AudioEngine.toggleMute();
      });
      
      TimerEngine.start(() => {
        CTAEngine.showOutro(false);
      });
    });
  </script>
